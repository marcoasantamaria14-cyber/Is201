<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Snake Game</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  h1 { margin-top: 10px; }

  #score, #highScore {
    font-size: 18px;
    margin: 5px;
  }

  canvas {
    background: #1a1a1a;
    display: block;
    margin: 0 auto;
    border: 2px solid white;
  }

  button {
    margin: 5px;
    padding: 10px 14px;
    font-size: 13px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  #startBtn { background: green; color: white; }
  #pauseBtn { background: orange; color: black; display: none; }
  #resumeBtn { background: #00bfff; color: white; display: none; }
  #restartBtn { background: red; color: white; display: none; }

  #gameOver, #pausedText, #immunityText {
    font-size: 20px;
    display: none;
  }
</style>
</head>

<body>

<h1>🐍 Ultimate Snake Game</h1>

<div id="score">Score: 0</div>
<div id="highScore">High Score: 0</div>

<button id="startBtn">Start</button>
<button id="pauseBtn">Pause</button>
<button id="resumeBtn">Resume</button>
<button id="restartBtn">Restart</button>

<canvas id="game" width="400" height="400"></canvas>

<div id="pausedText">Paused</div>
<div id="gameOver">Game Over!</div>
<div id="immunityText">🛡️ Immunity Active</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;

let snake, dx, dy;
let blueGem, goldGem;
let obstacles = [];

let score = 0;
let highScore = localStorage.getItem("snakeHigh") || 0;

let running = false;
let paused = false;

let speed = 100;
let loop;

let immune = false;
let skin = 0;

// ---------- INIT ----------
function initGame() {
  snake = [{x: 200, y: 200}];
  dx = grid;
  dy = 0;

  blueGem = randomPosition();
  goldGem = null;

  obstacles = [];

  score = 0;
  speed = 100;
  immune = false;

  running = true;
  paused = false;

  document.getElementById("score").innerText = "Score: 0";
  document.getElementById("highScore").innerText = "High Score: " + highScore;

  document.getElementById("gameOver").style.display = "none";
  document.getElementById("pausedText").style.display = "none";
  document.getElementById("immunityText").style.display = "none";
}

// ---------- HELPERS ----------
function randomPosition() {
  return {
    x: Math.floor(Math.random() * (canvas.width / grid)) * grid,
    y: Math.floor(Math.random() * (canvas.height / grid)) * grid
  };
}

function safeSpawn() {
  let p;
  do {
    p = randomPosition();
  } while (snake?.some(s => s.x === p.x && s.y === p.y));
  return p;
}

// ---------- DRAW GEM ----------
function drawBlueGem() {
  const x = blueGem.x + grid/2;
  const y = blueGem.y + grid/2;

  ctx.fillStyle = "#00e5ff";
  ctx.beginPath();
  ctx.moveTo(x, y - 8);
  ctx.lineTo(x + 8, y);
  ctx.lineTo(x, y + 8);
  ctx.lineTo(x - 8, y);
  ctx.closePath();
  ctx.fill();
}

function drawGoldGem() {
  if (!goldGem) return;

  const x = goldGem.x + grid/2;
  const y = goldGem.y + grid/2;

  ctx.fillStyle = "gold";
  ctx.beginPath();
  ctx.moveTo(x, y - 9);
  ctx.lineTo(x + 9, y);
  ctx.lineTo(x, y + 9);
  ctx.lineTo(x - 9, y);
  ctx.closePath();
  ctx.fill();
}

// ---------- OBSTACLES ----------
function addObstacle() {
  obstacles.push(safeSpawn());
}

function drawObstacles() {
  ctx.fillStyle = "#555";
  obstacles.forEach(o => {
    ctx.fillRect(o.x, o.y, grid, grid);
  });
}

// ---------- SNAKE ----------
function drawSnake() {
  snake.forEach((p, i) => {
    let color =
      skin === 0 ? (i === 0 ? "#00ff99" : "#00cc66") :
      skin === 1 ? (i === 0 ? "#ff4d4d" : "#b30000") :
      (i === 0 ? "#ffd700" : "#b8860b");

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(p.x, p.y, grid, grid, 6);
    ctx.fill();
  });

  const head = snake[0];

  // eyes
  let ex1 = head.x + 5, ey1 = head.y + 5;
  let ex2 = head.x + 15, ey2 = head.y + 5;

  if (dx === grid) { ex1 = head.x + 12; ex2 = head.x + 12; }
  if (dx === -grid) { ex1 = head.x + 8; ex2 = head.x + 8; }
  if (dy === grid) { ey1 = head.y + 12; ey2 = head.y + 12; }
  if (dy === -grid) { ey1 = head.y + 8; ey2 = head.y + 8; }

  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(ex1, ey1, 3, 0, Math.PI*2);
  ctx.arc(ex2, ey2, 3, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(ex1, ey1, 1.5, 0, Math.PI*2);
  ctx.arc(ex2, ey2, 1.5, 0, Math.PI*2);
  ctx.fill();

  // tongue 👅
  ctx.strokeStyle = "red";
  ctx.lineWidth = 2;

  let tx = head.x + grid/2;
  let ty = head.y + grid/2;

  let tipX = tx, tipY = ty;
  if (dx === grid) tipX += 10;
  if (dx === -grid) tipX -= 10;
  if (dy === grid) tipY += 10;
  if (dy === -grid) tipY -= 10;

  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.lineTo(tipX, tipY);
  ctx.stroke();
}

// ---------- GAME LOGIC ----------
function updateDifficulty() {
  if (score % 10 === 0 && score > 0) {
    speed = Math.max(40, speed - 5);
    clearInterval(loop);
    loop = setInterval(step, speed);
  }

  if (score % 15 === 0 && score > 0) {
    addObstacle();
  }

  if (score % 20 === 0 && score > 0 && !goldGem) {
    goldGem = safeSpawn();
  }
}

function step() {
  if (!running || paused) return;

  ctx.clearRect(0,0,400,400);

  let head = {x: snake[0].x + dx, y: snake[0].y + dy};

  // wrap walls
  if (head.x < 0) head.x = canvas.width - grid;
  if (head.x >= canvas.width) head.x = 0;
  if (head.y < 0) head.y = canvas.height - grid;
  if (head.y >= canvas.height) head.y = 0;

  // collisions
  if (!immune) {
    for (let p of snake) {
      if (p.x === head.x && p.y === head.y) return endGame();
    }

    for (let o of obstacles) {
      if (o.x === head.x && o.y === head.y) return endGame();
    }
  }

  snake.unshift(head);

  let ate = false;

  // 💎 blue gem
  if (head.x === blueGem.x && head.y === blueGem.y) {
    score++;
    blueGem = safeSpawn();
    ate = true;
    updateDifficulty();
  }

  // 💛 gold gem
  if (goldGem && head.x === goldGem.x && head.y === goldGem.y) {
    score += 3;
    goldGem = null;
    ate = true;

    immune = true;
    document.getElementById("immunityText").style.display = "block";

    setTimeout(() => {
      immune = false;
      document.getElementById("immunityText").style.display = "none";
    }, 10000);
  }

  // 🐍 IMPORTANT: only shrink if NOT eating anything
  if (!ate) {
    snake.pop();
  }

  document.getElementById("score").innerText = "Score: " + score;

  drawBlueGem();
  drawGoldGem();
  drawObstacles();
  drawSnake();
}

// ---------- GAME CONTROL ----------
function startGame() {
  initGame();

  document.getElementById("startBtn").style.display = "none";
  document.getElementById("pauseBtn").style.display = "inline-block";
  document.getElementById("restartBtn").style.display = "none";

  clearInterval(loop);
  loop = setInterval(step, speed);
}

function pauseGame() {
  paused = true;
  document.getElementById("pausedText").style.display = "block";

  document.getElementById("pauseBtn").style.display = "none";
  document.getElementById("resumeBtn").style.display = "inline-block";
  document.getElementById("restartBtn").style.display = "inline-block";
}

function resumeGame() {
  paused = false;
  document.getElementById("pausedText").style.display = "none";

  document.getElementById("resumeBtn").style.display = "none";
  document.getElementById("pauseBtn").style.display = "inline-block";
  document.getElementById("restartBtn").style.display = "none";
}

function endGame() {
  running = false;
  clearInterval(loop);

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("snakeHigh", highScore);
  }

  document.getElementById("gameOver").style.display = "block";
  document.getElementById("restartBtn").style.display = "inline-block";
}

function restartGame() {
  startGame();
}

// ---------- CONTROLS ----------
document.addEventListener("keydown", e => {
  if (!running || paused) return;

  if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -grid; }
  else if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = grid; }
  else if (e.key === "ArrowLeft" && dx === 0) { dx = -grid; dy = 0; }
  else if (e.key === "ArrowRight" && dx === 0) { dx = grid; dy = 0; }
});

// swipe controls
let startX, startY;

canvas.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", e => {
  let dxTouch = e.changedTouches[0].clientX - startX;
  let dyTouch = e.changedTouches[0].clientY - startY;

  if (Math.abs(dxTouch) > Math.abs(dyTouch)) {
    if (dxTouch > 0 && dx === 0) { dx = grid; dy = 0; }
    else if (dxTouch < 0 && dx === 0) { dx = -grid; dy = 0; }
  } else {
    if (dyTouch > 0 && dy === 0) { dx = 0; dy = grid; }
    else if (dyTouch < 0 && dy === 0) { dx = 0; dy = -grid; }
  }
});

// buttons
document.getElementById("startBtn").onclick = startGame;
document.getElementById("pauseBtn").onclick = pauseGame;
document.getElementById("resumeBtn").onclick = resumeGame;
document.getElementById("restartBtn").onclick = restartGame;

</script>

</body>
</html>
